<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎈 Кунгурские аэронавты</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#111;overflow:hidden;font-family:system-ui,sans-serif;user-select:none;-webkit-user-select:none;touch-action:none}
#wrap{position:relative;width:100vw;height:100vh}
#gc{display:block;width:100%;height:100%;cursor:pointer}
#ui{position:absolute;top:0;left:0;right:0;pointer-events:none;padding:10px 14px;display:flex;gap:8px;align-items:flex-start}
.bw{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0}
.bl{font-size:12px;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.8);font-weight:600}
.bb{width:100%;height:10px;border-radius:5px;background:rgba(0,0,0,.4);overflow:hidden}
.bf{height:100%;border-radius:5px;transition:width .1s,background .3s}
#lv{display:flex;gap:2px;align-items:center;background:rgba(0,0,0,.4);border-radius:8px;padding:4px 8px;font-size:16px}
#sc{background:rgba(0,0,0,.4);border-radius:8px;padding:4px 12px;color:#fff;font-size:14px;font-weight:600;text-shadow:0 1px 3px rgba(0,0,0,.7);white-space:nowrap}
#hb{position:absolute;bottom:8px;left:10px;pointer-events:none;background:rgba(0,0,0,.35);border-radius:8px;padding:4px 12px;color:rgba(255,255,255,.9);font-size:12px}
#hn{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.5);border-radius:10px;padding:6px 16px;color:#fff;font-size:13px;pointer-events:none;white-space:nowrap}
#lb{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;opacity:0;transition:opacity .4s;background:rgba(0,0,0,.6);border-radius:14px;padding:12px 28px;color:#fff;font-size:22px;font-weight:700;white-space:nowrap}
#bw2{position:absolute;right:14px;top:50%;transform:translateY(-50%);pointer-events:none;opacity:0;transition:opacity .2s;background:rgba(200,30,30,.85);border-radius:10px;padding:6px 12px;color:#fff;font-size:13px;font-weight:700}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="gc"></canvas>
  <div id="ui">
    <div class="bw"><div class="bl">⛽ Газ</div><div class="bb"><div class="bf" id="gf" style="width:100%;background:#5DCAA5"></div></div></div>
    <div class="bw"><div class="bl">⚡ Буст</div><div class="bb"><div class="bf" id="bf2" style="width:0%;background:#B39DDB"></div></div></div>
    <div id="lv"></div>
    <div id="sc">0 м</div>
  </div>
  <div id="hb">📍 Кунгур &nbsp;⏱ рассвет</div>
  <div id="visitor-cnt" style="position:absolute;bottom:8px;right:10px;pointer-events:none;color:rgba(255,255,255,.5);font-size:11px;font-family:system-ui"></div>
  <div id="hn">Держи экран / пробел — подъём</div>
  <div id="lb"></div>
  <div id="bw2">⚡ Туча!</div>

  <!-- audio buttons — bottom right, не мешают жизням -->
  <div id="audio-btns" style="position:absolute;bottom:48px;right:10px;display:flex;gap:5px;pointer-events:all;z-index:4">
    <button id="btn-music" onclick="toggleMusic();this.style.opacity=musicOn?'1':'.4'" title="Музыка" style="background:rgba(0,0,0,.4);border:none;border-radius:8px;padding:5px 8px;color:#fff;font-size:14px;cursor:pointer;opacity:1">🎵</button>
    <button id="btn-sfx" onclick="toggleSfx();this.style.opacity=sfxOn?'1':'.4'" title="Звуки" style="background:rgba(0,0,0,.4);border:none;border-radius:8px;padding:5px 8px;color:#fff;font-size:14px;cursor:pointer;opacity:1">🔊</button>
    <button onclick="showLeaderboard()" title="Лидеры" style="background:rgba(0,0,0,.4);border:none;border-radius:8px;padding:5px 8px;color:#fff;font-size:14px;cursor:pointer">🏆</button>
  </div>

  <!-- leaderboard full-screen overlay -->
  <div id="lb-panel" style="display:none;position:absolute;inset:0;background:rgba(10,8,20,.92);z-index:20;overflow-y:auto">
    <div style="max-width:420px;margin:0 auto;padding:20px 16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
        <h2 style="color:#FFD700;font-size:22px;margin:0;font-family:system-ui">🏆 Лидеры</h2>
        <button onclick="hideLeaderboard()" style="background:rgba(255,255,255,.12);border:none;border-radius:10px;padding:7px 14px;color:#fff;font-size:14px;cursor:pointer;font-family:system-ui">✕ Закрыть</button>
      </div>
      <div id="lb-loading" style="color:rgba(255,255,255,.5);text-align:center;padding:30px;font-family:system-ui;font-size:14px">Загружаем...</div>
      <div id="lb-list" style="font-family:system-ui"></div>
    </div>
  </div>

  <!-- new record prompt after game over -->
  <div id="record-prompt" style="display:none;position:absolute;bottom:130px;left:50%;transform:translateX(-50%);background:rgba(10,8,20,.92);border:1px solid rgba(255,215,0,.3);border-radius:16px;padding:18px 20px;z-index:15;min-width:280px;max-width:90vw;text-align:center;font-family:system-ui">
    <p style="color:#FFD700;font-weight:700;font-size:16px;margin:0 0 12px">🏆 Отличный результат!</p>
    <p style="color:rgba(255,255,255,.7);font-size:13px;margin:0 0 12px">Введи имя чтобы попасть в таблицу</p>
    <div style="display:flex;gap:8px">
      <input id="rp-name" maxlength="20" placeholder="Твоё имя" style="flex:1;padding:9px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.2);font-size:14px;background:rgba(255,255,255,.1);color:#fff;outline:none;font-family:system-ui"/>
      <button onclick="submitScoreFromPrompt()" style="background:#FFB300;border:none;border-radius:10px;padding:9px 16px;color:#1A0A00;font-weight:700;font-size:14px;cursor:pointer;white-space:nowrap">Записать</button>
    </div>
    <button onclick="document.getElementById('record-prompt').style.display='none'" style="background:none;border:none;color:rgba(255,255,255,.4);font-size:12px;cursor:pointer;margin-top:10px;font-family:system-ui">Пропустить</button>
  </div>
</div>
<script>
(function(){
const cv=document.getElementById('gc'),ctx=cv.getContext('2d');
const gfEl=document.getElementById('gf'),bf2El=document.getElementById('bf2');
const scEl=document.getElementById('sc'),lvEl=document.getElementById('lv');
const hnEl=document.getElementById('hn'),hbEl=document.getElementById('hb');
const lbEl=document.getElementById('lb'),bwEl=document.getElementById('bw2');

let W,H;
function resize(){W=cv.width=cv.offsetWidth;H=cv.height=cv.offsetHeight;}
window.addEventListener('resize',resize);
resize();

const R_VIS=()=>Math.max(32,Math.min(52,W*0.055));
const R_HIT=()=>R_VIS()*0.68;
const BX=()=>Math.round(W*0.25);
const GY=()=>H-50-R_VIS()-10;
const CY=()=>R_VIS()+10;
const LIFT=-0.95,GRAV=0.40,DAMP=0.84,LIFT_B=-1.25,GRAV_B=0.38,VMAX=8;

const TIMES=[
  {n:'рассвет',sky:['#C8603A','#EE9845','#C0D8F0','#88C0A0'],sun:'#FFD54F',sunY:.82},
  {n:'день',   sky:['#3A9FE8','#5AB8F5','#88C8F8','#A0D8A8'],sun:'#FFF176',sunY:.08},
  {n:'закат',  sky:['#A02808','#D03810','#EE7000','#604038'],sun:'#FF8C00',sunY:.82},
  {n:'ночь',   sky:['#0A1828','#122038','#182840','#142C20'],sun:'#D0DCFF',sunY:.08},
];
const LOCS=[{n:'Кунгур',d:0},{n:'Пермь',d:900},{n:'Санкт-Петербург',d:2200},{n:'Москва',d:3800},{n:'Владивосток',d:5800}];

let st='start',score=0,gas=1,lives=3,fr=0,spd=3.5,scrollX=0,gasDecay=0.00065;
let lift=false;
let inv=0,INV_MAX=300,boost=0,boostMax=0,magnet=0,tiny=0,turbo=0;

// ── Audio Engine ──────────────────────────────────────
let AC=null,musicGain=null,sfxGain=null,burnerNode=null,musicNodes=[];
let audioReady=false,musicOn=true,sfxOn=true;

function initAudio(){
  if(AC)return;
  AC=new(window.AudioContext||window.webkitAudioContext)();
  musicGain=AC.createGain();musicGain.gain.value=0.18;musicGain.connect(AC.destination);
  sfxGain=AC.createGain();sfxGain.gain.value=0.55;sfxGain.connect(AC.destination);
  audioReady=true;
  startMusic();
}

// ── play one-shot tone ────────────────────────────────
function playTone(freq,type,dur,vol,attack,decay,pitchEnd){
  if(!audioReady||!sfxOn)return;
  const o=AC.createOscillator(),g=AC.createGain();
  o.type=type||'sine';o.frequency.value=freq;
  if(pitchEnd)o.frequency.linearRampToValueAtTime(pitchEnd,AC.currentTime+dur);
  g.gain.setValueAtTime(0,AC.currentTime);
  g.gain.linearRampToValueAtTime(vol||0.4,AC.currentTime+(attack||0.01));
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur-(decay||0.02));
  o.connect(g);g.connect(sfxGain);
  o.start(AC.currentTime);o.stop(AC.currentTime+dur);
}

// ── play noise burst (explosion / hit) ───────────────
function playNoise(dur,vol,freq1,freq2){
  if(!audioReady||!sfxOn)return;
  const buf=AC.createBuffer(1,Math.round(AC.sampleRate*dur),AC.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
  const src=AC.createBufferSource();src.buffer=buf;
  const filt=AC.createBiquadFilter();filt.type='bandpass';
  filt.frequency.value=freq1||400;
  filt.frequency.linearRampToValueAtTime(freq2||200,AC.currentTime+dur);
  filt.Q.value=1.5;
  const g=AC.createGain();g.gain.setValueAtTime(vol||0.3,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  src.connect(filt);filt.connect(g);g.connect(sfxGain);
  src.start();src.stop(AC.currentTime+dur);
}

// ── sound events ──────────────────────────────────────
function sndBurnerOn(){
  if(!audioReady||!sfxOn)return;
  if(burnerNode){try{burnerNode.stop();}catch(e){}burnerNode=null;}
  const buf=AC.createBuffer(1,Math.round(AC.sampleRate*0.12),AC.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
  const src=AC.createBufferSource();src.buffer=buf;src.loop=true;
  const filt=AC.createBiquadFilter();filt.type='highpass';filt.frequency.value=800;
  const g=AC.createGain();g.gain.setValueAtTime(0,AC.currentTime);
  g.gain.linearRampToValueAtTime(0.15,AC.currentTime+0.05);
  src.connect(filt);filt.connect(g);g.connect(sfxGain);
  src.start();burnerNode={src,g};
}
function sndBurnerOff(){
  if(!burnerNode)return;
  try{
    burnerNode.g.gain.setValueAtTime(burnerNode.g.gain.value,AC.currentTime);
    burnerNode.g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.08);
    burnerNode.src.stop(AC.currentTime+0.1);
  }catch(e){}
  burnerNode=null;
}
function sndGas(){
  // satisfying "whoosh refill"
  playTone(180,'sine',0.25,0.35,0.02,0.05,380);
  playTone(360,'sine',0.18,0.2,0.05,0.04,580);
}
function sndPickup(){
  // bright ding
  playTone(880,'sine',0.12,0.4,0.005,0.02,1200);
  setTimeout(()=>playTone(1320,'sine',0.1,0.3,0.005,0.02),60);
}
function sndLife(){
  // joyful ascending chord
  [440,554,659,880].forEach((f,i)=>setTimeout(()=>playTone(f,'sine',0.2,0.35,0.01,0.05),i*55));
}
function sndShield(){
  // sparkly sweep
  playTone(600,'square',0.22,0.15,0.01,0.04,1400);
  playTone(800,'sine',0.18,0.2,0.02,0.04,1800);
}
function sndTurbo(){
  playTone(200,'sawtooth',0.3,0.2,0.01,0.05,600);
  playNoise(0.15,0.18,300,800);
}
function sndMagnet(){
  playTone(440,'sine',0.15,0.25,0.01,0.04,320);
  playTone(660,'sine',0.12,0.2,0.02,0.04,480);
}
function sndTiny(){
  playTone(1200,'sine',0.18,0.3,0.005,0.03,600);
}
function sndHit(){
  playNoise(0.18,0.45,500,150);
  playTone(120,'sawtooth',0.2,0.35,0.005,0.04,60);
}
function sndDie(){
  playNoise(0.35,0.5,400,80);
  playTone(200,'sawtooth',0.4,0.4,0.01,0.1,50);
  setTimeout(()=>playTone(80,'sine',0.3,0.3,0.02,0.1),120);
}
function sndStart(){
  [261,329,392,523].forEach((f,i)=>setTimeout(()=>playTone(f,'sine',0.25,0.3,0.01,0.06),i*80));
}
function sndLocChange(){
  playTone(523,'sine',0.15,0.3,0.01,0.04);
  setTimeout(()=>playTone(659,'sine',0.15,0.3,0.01,0.04),100);
  setTimeout(()=>playTone(784,'sine',0.2,0.35,0.01,0.05),200);
}

// ── procedural music ──────────────────────────────────
// Gentle folk-ish melody — pentatonic, non-intrusive
function startMusic(){
  if(!audioReady||!musicOn)return;
  stopMusic();

  // ── Soft sustained pad — warm drifting chords (sky/flight feel) ──
  const padProgression=[
    [196,247,294],   // G major
    [220,261,329],   // A minor-ish
    [174,220,261],   // F major
    [196,247,311],   // G aug feel
  ];
  let padIdx=0;
  function playPadChord(){
    if(!audioReady||!musicOn)return;
    const chord=padProgression[padIdx%padProgression.length];
    padIdx++;
    const dur=4.2;
    chord.forEach((f,i)=>{
      const o=AC.createOscillator(),g=AC.createGain();
      o.type='sine';o.frequency.value=f;
      const filt=AC.createBiquadFilter();filt.type='lowpass';filt.frequency.value=1200;
      g.gain.setValueAtTime(0,AC.currentTime);
      g.gain.linearRampToValueAtTime(0.05,AC.currentTime+1.2);
      g.gain.linearRampToValueAtTime(0.05,AC.currentTime+dur-1.4);
      g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
      o.connect(filt);filt.connect(g);g.connect(musicGain);
      o.start();o.stop(AC.currentTime+dur);
    });
    const pt=setTimeout(playPadChord,dur*1000-300);
    musicNodes.push({stop:()=>clearTimeout(pt)});
  }
  playPadChord();

  // ── Gentle bell-like melody — sparse, airy, music-box feel ───────
  const melody=[
    [659,.6],[0,.3],[784,.5],[0,.2],[698,.7],[0,.4],
    [587,.6],[0,.3],[659,.5],[0,.2],[523,.9],[0,.6],
    [698,.6],[0,.3],[784,.5],[0,.2],[880,.7],[0,.4],
    [784,.6],[0,.3],[698,.5],[0,.2],[659,1.0],[0,.8],
  ];
  let melodyTimer=null;
  function playMelody(){
    if(!audioReady||!musicOn)return;
    let t=AC.currentTime+0.1;
    melody.forEach(([freq,dur])=>{
      if(freq>0){
        const o=AC.createOscillator(),g=AC.createGain();
        o.type='sine';o.frequency.value=freq;
        const o2=AC.createOscillator(),g2=AC.createGain();
        o2.type='triangle';o2.frequency.value=freq*2;
        g.gain.setValueAtTime(0,t);
        g.gain.linearRampToValueAtTime(0.13,t+0.02);
        g.gain.exponentialRampToValueAtTime(0.001,t+dur*.9);
        g2.gain.setValueAtTime(0,t);
        g2.gain.linearRampToValueAtTime(0.03,t+0.02);
        g2.gain.exponentialRampToValueAtTime(0.001,t+dur*.5);
        o.connect(g);g.connect(musicGain);
        o2.connect(g2);g2.connect(musicGain);
        o.start(t);o.stop(t+dur);
        o2.start(t);o2.stop(t+dur*.5);
      }
      t+=dur;
    });
    const totalDur=melody.reduce((a,[,d])=>a+d,0);
    melodyTimer=setTimeout(playMelody,(totalDur*1000)+400);
    musicNodes.push({stop:()=>clearTimeout(melodyTimer)});
  }
  playMelody();

  // ── Soft low drone for grounding ──────────────────
  const drone=AC.createOscillator(),droneG=AC.createGain();
  drone.type='sine';drone.frequency.value=98;
  droneG.gain.value=0.035;
  drone.connect(droneG);droneG.connect(musicGain);
  drone.start();
  musicNodes.push(drone,droneG);
}

function stopMusic(){
  musicNodes.forEach(n=>{try{if(n.stop)n.stop();}catch(e){}});
  musicNodes=[];
}
function toggleMusic(){
  musicOn=!musicOn;
  if(musicOn&&audioReady)startMusic();else stopMusic();
}
function toggleSfx(){sfxOn=!sfxOn;}
window.toggleMusic=toggleMusic;
window.toggleSfx=toggleSfx;
let timeIdx=0,locIdx=0,timeTimer=0;
let bal={x:200,y:300,vy:0};
let trees=[],clouds=[],stormClouds=[],pkups=[],birds=[],parts=[],bgB=[],bgD=[],stars=[];
let lastT=0,lastP=0,lastBird=0,lastGas=0,lastStorm=0;
let dieCD=0,birdWarnT=0,lbTimer=0;

function rnd(a,b){return a+Math.random()*(b-a);}

// ── Leaderboard — Supabase ────────────────────────────
const SB_URL='https://thlsatasbstmrnofuisv.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRobHNhdGFzYnN0bXJub2Z1aXN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3OTI2NjgsImV4cCI6MjA5NzM2ODY2OH0.AowSk6AuGLlu9Sab56Uwd55JA1U-G0HRMDGwPQLVpDA';
const SB_HDR={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};

let pendingScore=0,startTop3=[];
async function loadTop3(){
  const rows=await sbGet();
  if(rows)startTop3=rows.slice(0,3);
}
let deadTop=[];
async function loadDeadTop(){
  const rows=await sbGet();

// visitor counter
async function countVisit(){
  try{
    // upsert visitor count using a special row
    await fetch(SB_URL+'/rest/v1/rpc/increment_visitors',{
      method:'POST',headers:{...SB_HDR,'Content-Type':'application/json'},body:'{}'
    });
  }catch(e){}
}
// simple visit count via scores table length display
async function getVisitorCount(){
  try{
    const r=await fetch(SB_URL+'/rest/v1/scores?select=id',{headers:{...SB_HDR,'Prefer':'count=exact','Range':'0-0'}});
    const count=parseInt(r.headers.get('content-range')?.split('/')[1]||'0');
    return count;
  }catch(e){return 0;}
}
async function sbGet(){
  try{
    const r=await fetch(SB_URL+'/rest/v1/scores?select=name,score,location,created_at&order=score.desc&limit=20',{headers:SB_HDR});
    if(!r.ok)return null;
    return await r.json();
  }catch(e){return null;}
}

async function sbInsert(name,score,location){
  try{
    const r=await fetch(SB_URL+'/rest/v1/scores',{
      method:'POST',
      headers:{...SB_HDR,'Prefer':'return=minimal'},
      body:JSON.stringify({name,score:Math.floor(score),location})
    });
    return r.ok;
  }catch(e){return false;}
}

function lbRender(rows){
  const list=document.getElementById('lb-list');
  document.getElementById('lb-loading').style.display='none';
  if(!rows||!rows.length){
    list.innerHTML='<p style="color:rgba(255,255,255,.5);text-align:center;padding:30px;font-size:14px">Пока нет результатов.<br>Будь первым! 🎈</p>';
    return;
  }
  const medals=['🥇','🥈','🥉'];
  list.innerHTML=rows.map((e,i)=>{
    const d=new Date(e.created_at);
    const dateStr=d.toLocaleDateString('ru',{day:'numeric',month:'short'});
    return `<div style="display:flex;align-items:center;gap:10px;padding:11px 14px;margin-bottom:6px;
      background:rgba(255,255,255,${i===0?.14:.07});border-radius:12px;
      ${i===0?'border:1px solid rgba(255,215,0,.35)':''}">
      <span style="font-size:20px;min-width:30px;text-align:center">${medals[i]||`<span style="color:rgba(255,255,255,.45);font-size:13px">${i+1}</span>`}</span>
      <span style="flex:1;font-weight:${i<3?'600':'400'};color:${i===0?'#FFD700':'#fff'};font-size:15px">${e.name}</span>
      <span style="font-size:11px;color:rgba(255,255,255,.4)">${e.location||''}</span>
      <span style="color:#FFD700;font-weight:700;font-size:16px;min-width:60px;text-align:right">${e.score} м</span>
    </div>`;
  }).join('');
}

async function showLeaderboard(){
  const panel=document.getElementById('lb-panel');
  panel.style.display='block';
  document.getElementById('lb-loading').style.display='block';
  document.getElementById('lb-list').innerHTML='';
  const rows=await sbGet();
  lbRender(rows);
}
function hideLeaderboard(){
  document.getElementById('lb-panel').style.display='none';
}

async function submitScoreFromPrompt(){
  const name=document.getElementById('rp-name').value.trim()||'Аноним';
  const loc=LOCS.filter(l=>pendingScore>=l.d).pop().n;
  document.getElementById('record-prompt').style.display='none';
  // show saving indicator
  const btn=document.querySelector('#record-prompt button');
  await sbInsert(name,pendingScore,loc);
  pendingScore=0;
}

function maybePromptScore(sc){
  if(sc<50)return;
  pendingScore=sc;

const SPR={};
function makeSVGSprite(key,svgStr,sw,sh){
  const img=new Image();
  const blob=new Blob([svgStr],{type:'image/svg+xml'});
  const url=URL.createObjectURL(blob);
  img.onload=()=>{
    const oc=document.createElement('canvas');
    oc.width=sw;oc.height=sh;
    const octx=oc.getContext('2d');
    octx.drawImage(img,0,0,sw,sh);
    SPR[key]=oc;
    URL.revokeObjectURL(url);
  };
  img.src=url;
}

function dCloud(c){
  const isN=timeIdx===3;
  if(!c.puffs){
    c.puffs=[{ox:0,oy:0,r:c.ry,sx:1},{ox:-c.rx*.4,oy:4,r:c.ry*.9,sx:1},{ox:c.rx*.4,oy:3,r:c.ry*.85,sx:1}];
  }
  const baseLight = isN ? [88,98,135] : [255,255,255];
  const baseShade = isN ? [50,58,95]  : [195,205,222];

  ctx.save();
  // soft drop shadow under the whole cloud
  ctx.fillStyle = isN ? 'rgba(10,15,35,.22)' : 'rgba(120,130,155,.20)';
  ctx.beginPath();ctx.ellipse(c.x+5,c.y+c.ry*1.15,c.rx*.8,c.ry*.3,0,0,6.28);ctx.fill();

  // draw each puff with its own radial shading for volume
  const allPuffs=[{ox:0,oy:0,r:c.rx*.62},...c.puffs];
  allPuffs.forEach(p=>{
    const px=c.x+p.ox, py=c.y-p.oy;
    const r=p.r;
    const grad=ctx.createRadialGradient(px-r*.3,py-r*.4,r*.1, px,py,r*1.05);
    grad.addColorStop(0, `rgba(${baseLight[0]},${baseLight[1]},${baseLight[2]},${c.a})`);
    grad.addColorStop(0.6, `rgba(${(baseLight[0]+baseShade[0])/2},${(baseLight[1]+baseShade[1])/2},${(baseLight[2]+baseShade[2])/2},${c.a})`);
    grad.addColorStop(1, `rgba(${baseShade[0]},${baseShade[1]},${baseShade[2]},${c.a*.85})`);
    ctx.fillStyle=grad;
    ctx.beginPath();ctx.ellipse(px,py,r,r*.82,0,0,6.28);ctx.fill();
  });

  // bright rim highlight on top-left of the main puff (sun-lit edge)
  if(!isN){
    const hp=allPuffs[1]||allPuffs[0];

    }
  }
}
function dTrain(t){
  const y=H-50,carriageW=80,gap=4;
  const cols=['#1A237E','#283593','#1A237E','#283593','#1A237E'];
  for(let i=0;i<5;i++){
    const cx=t.x+i*(carriageW+gap);
    if(cx+carriageW<0||cx>W)continue;
    ctx.fillStyle=cols[i];ctx.beginPath();ctx.roundRect(cx,y-28,carriageW,28,4);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1;ctx.stroke();
    // windows
    ctx.fillStyle='rgba(200,235,255,.8)';
    for(let w2=0;w2<3;w2++)ctx.beginPath();
    [18,38,58].forEach(wx=>{
      ctx.fillStyle='rgba(200,235,255,.75)';
      ctx.beginPath();ctx.roundRect(cx+wx,y-22,14,12,2);ctx.fill();
    });
    // wheels
    ctx.fillStyle='#111';
    [cx+15,cx+65].forEach(wx=>{ctx.beginPath();ctx.arc(wx,y,5,0,6.28);ctx.fill();});
  }
  // locomotive front
  const lx=t.x-18;
  if(lx>-40&&lx<W+40){
    ctx.fillStyle='#B71C1C';ctx.beginPath();ctx.roundRect(lx,y-34,20,34,4);ctx.fill();
    // smoke
    if(fr%8<4){
      ctx.fillStyle='rgba(180,180,180,.4)';
      ctx.beginPath();ctx.arc(lx+10,y-40,8,0,6.28);ctx.fill();
      ctx.beginPath();ctx.arc(lx+16,y-48,5,0,6.28);ctx.fill();
    }
  }
}
function dBgBuildings(){
  const isN=timeIdx===3;
  bgB.forEach(b=>{
    b.x-=spd*.12;if(b.x<-b.w)b.x=W+b.w;
    const by=H-50-b.h;
    // building shadow
    ctx.fillStyle='rgba(0,0,0,.18)';ctx.fillRect(b.x+4,by+4,b.w,b.h);
    // building body
    ctx.fillStyle=b.col;ctx.fillRect(b.x,by,b.w,b.h);
    // roof details
    ctx.fillStyle='rgba(0,0,0,.2)';ctx.fillRect(b.x,by,b.w,4);
    // windows — pre-generated, flicker at night
    b.winFlicker=(b.winFlicker||0)+1;
    const flickering=b.winFlicker>180&&b.winFlicker<186;
    const ww=Math.max(6,b.w/b.winCols-5),wh=10;
    for(let r=0;r<b.winRows;r++){
      for(let cl2=0;cl2<b.winCols;cl2++){
        const idx=r*b.winCols+cl2;
        const lit=b.wins[idx]&&!(flickering&&idx%3===0);
        const wx2=b.x+5+cl2*(b.w-8)/Math.max(1,b.winCols-1);
        const wy2=by+8+r*14;
        if(wy2+wh>H-52)continue;
        ctx.fillStyle=isN?(lit?'rgba(255,225,100,.85)':'rgba(20,20,35,.8)'):(lit?'rgba(180,215,255,.65)':'rgba(30,30,50,.4)');
        ctx.beginPath();ctx.roundRect(wx2-ww/2,wy2,ww,wh,1);ctx.fill();
      }
    }
    if(b.winFlicker>200)b.winFlicker=Math.random()*200;
  });
  // landmarks
  bgD.forEach(d=>{
    d.x-=spd*.09;if(d.x<-160)d.x=W+160;
    if(d.t==='stela')dStela(d.x,d.y);
    else if(d.t==='kremlin')dKremlin(d.x,d.y);
    else if(d.t==='spb')dSpb(d.x,d.y);
    else{
      const key='church'+d.s;
      const sizes=[[92,245],[80,205],[100,195]];
      const [sw,sh]=sizes[d.s];
      const scale=Math.min(1,H*.45/sh);
      dSpr(key,d.x,d.y,sw*scale,sh*scale);
    }
  });
  // cars on road
  cars.forEach(car=>{
    car.x+=car.vx;
    if(car.x>W+60)car.x=-60;
    if(car.x<-60)car.x=W+60;
    dCar(car);
  });
  // train
  if(train.timer>0){train.timer--;}
  else{
    if(!train.on){train.on=true;train.x=-500;}
    train.x+=spd*1.8+3;
    dTrain(train);
    if(train.x>W+600){train.on=false;train.timer=Math.floor(rnd(400,900));}
  }
}

// ── balloon — pure canvas draw ────────────────────────
function dBalloon(bx,by,flame){
  const rv=R_VIS(),wb=Math.sin(fr*.06)*1.4,cy=by+wb;

  // ropes (4 lines from sphere bottom to basket)
  ctx.strokeStyle='rgba(60,30,5,.7)';ctx.lineWidth=Math.max(1.5,rv*.04);
  [[-rv*.4,rv*.78,-rv*.28],[- rv*.15,rv*.88,-rv*.18],[rv*.15,rv*.88,rv*.18],[rv*.4,rv*.78,rv*.28]].forEach(([ox,oy,bx2])=>{
    ctx.beginPath();ctx.moveTo(bx+ox,cy+oy);ctx.lineTo(bx+bx2,cy+rv+rv*.6);ctx.stroke();
  });

  // basket — wicker
  const bkw=rv*.82,bkh=rv*.52,bkx=bx-bkw/2,bky=cy+rv+rv*.55;
  ctx.fillStyle='#7B5A12';ctx.beginPath();ctx.roundRect(bkx,bky,bkw,bkh,rv*.08);ctx.fill();
  ctx.strokeStyle='#5A3F0A';ctx.lineWidth=1.5;ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,.18)';ctx.lineWidth=1;
  [.25,.5,.75].forEach(t=>{ctx.beginPath();ctx.moveTo(bkx+bkw*t,bky);ctx.lineTo(bkx+bkw*t,bky+bkh);ctx.stroke();});
  ctx.beginPath();ctx.moveTo(bkx,bky+bkh*.5);ctx.lineTo(bkx+bkw,bky+bkh*.5);ctx.stroke();

  // flame — burns brightly when lifting, off when not pressing
  if(flame){
    const t=fr*.08,jit1=Math.sin(t*1.7)*rv*.08,jit2=Math.sin(t*2.3+1)*rv*.06;
    ctx.save();ctx.beginPath();ctx.ellipse(bx,cy,rv*.9,rv*.95,0,0,6.28);ctx.clip();
    ctx.fillStyle='rgba(255,80,0,.78)';
    ctx.beginPath();ctx.moveTo(bx-rv*.2,cy+rv*.65);
    ctx.quadraticCurveTo(bx-rv*.25+jit1,cy+rv*.2,bx+jit1*.5,cy+rv*.1);
    ctx.quadraticCurveTo(bx+rv*.25+jit2,cy+rv*.2,bx+rv*.2,cy+rv*.65);
    ctx.closePath();ctx.fill();
    ctx.fillStyle='rgba(255,150,0,.9)';
    ctx.beginPath();ctx.moveTo(bx-rv*.13,cy+rv*.62);
    ctx.quadraticCurveTo(bx-rv*.15+jit2,cy+rv*.28,bx+jit2*.3,cy+rv*.16);
    ctx.quadraticCurveTo(bx+rv*.15+jit1,cy+rv*.28,bx+rv*.13,cy+rv*.62);
    ctx.closePath();ctx.fill();
    ctx.fillStyle='rgba(255,225,30,.92)';
    ctx.beginPath();ctx.moveTo(bx-rv*.07,cy+rv*.58);
    ctx.quadraticCurveTo(bx+jit1*.2,cy+rv*.32,bx+rv*.07,cy+rv*.58);
    ctx.closePath();ctx.fill();
    // sparks
    for(let i=0;i<4;i++){
      const sx=bx+Math.sin(t*3+i*1.5)*rv*.18,sy=cy+rv*.15-i*rv*.07+Math.sin(t*2+i)*rv*.04;
      ctx.fillStyle=`rgba(255,${180+Math.floor(Math.random()*75)},0,.8)`;
      ctx.beginPath();ctx.arc(sx,sy,rv*.035,0,6.28);ctx.fill();
    }
    ctx.restore();
  }

  // sphere — Russian tricolor (white/blue/red horizontal stripes)
  ctx.save();ctx.beginPath();ctx.ellipse(bx,cy,rv,rv,0,0,6.28);ctx.clip();
  const ph=rv*2/3;
  // top=white, middle=blue, bottom=red
  [['#FFFFFF',cy-rv],['#003DA5',cy-rv+ph],['#CC0000',cy-rv+ph*2]].forEach(([col,sy])=>{
    ctx.fillStyle=col;ctx.fillRect(bx-rv,sy,rv*2,ph+1);
  });
  // panel seams
  ctx.strokeStyle='rgba(0,0,0,.1)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(bx-rv,cy-rv+ph);ctx.lineTo(bx+rv,cy-rv+ph);ctx.stroke();
  ctx.beginPath();ctx.moveTo(bx-rv,cy-rv+ph*2);ctx.lineTo(bx+rv,cy-rv+ph*2);ctx.stroke();
  // vertical rib seams
  [-rv*.55,-rv*.22,0,rv*.22,rv*.55].forEach(ox=>{
    ctx.strokeStyle='rgba(0,0,0,.08)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(bx+ox,cy-rv);ctx.lineTo(bx+ox,cy+rv);ctx.stroke();
  });
  // roundness highlight
  const gr=ctx.createRadialGradient(bx-rv*.32,cy-rv*.32,rv*.04,bx,cy,rv);
  gr.addColorStop(0,'rgba(255,255,255,.30)');gr.addColorStop(.5,'rgba(255,255,255,.05)');gr.addColorStop(1,'rgba(0,0,0,.30)');
  ctx.fillStyle=gr;ctx.beginPath();ctx.ellipse(bx,cy,rv,rv,0,0,6.28);ctx.fill();
  ctx.restore();
  // outline
  ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(bx,cy,rv,rv,0,0,6.28);ctx.stroke();

  // top/bottom caps
  ctx.fillStyle='rgba(0,0,0,.38)';ctx.beginPath();ctx.ellipse(bx,cy-rv,rv*.28,rv*.08,0,0,6.28);ctx.fill();
  ctx.fillStyle='#555';ctx.beginPath();ctx.arc(bx,cy-rv,rv*.14,0,6.28);ctx.fill();
  ctx.fillStyle='rgba(0,0,0,.28)';ctx.beginPath();ctx.ellipse(bx,cy+rv,rv*.32,rv*.1,0,0,6.28);ctx.fill();

  // boost glows
  if(inv>0){
    ctx.globalAlpha=(.4+Math.sin(fr*.18)*.4)*(inv/INV_MAX);
    ctx.strokeStyle='#82CFFF';ctx.lineWidth=5;ctx.beginPath();ctx.ellipse(bx,cy,rv+5,rv+5,0,0,6.28);ctx.stroke();
    ctx.globalAlpha=1;
  }
  if(magnet>0){
    ctx.globalAlpha=.25+Math.sin(fr*.25)*.25;
    ctx.strokeStyle='#FF80C0';ctx.lineWidth=4;ctx.beginPath();ctx.ellipse(bx,cy,rv+10,rv+10,0,0,6.28);ctx.stroke();
    ctx.strokeStyle='rgba(255,80,160,.12)';ctx.lineWidth=2;ctx.setLineDash([6,6]);
    ctx.beginPath();ctx.arc(bx,cy,220,0,6.28);ctx.stroke();ctx.setLineDash([]);
    ctx.globalAlpha=1;
  }
  if(turbo>0){
    ctx.globalAlpha=.5+Math.sin(fr*.3)*.3;ctx.strokeStyle='#FFA030';ctx.lineWidth=3;
    [-rv*.5,-rv*.1,rv*.25].forEach(oy=>{ctx.beginPath();ctx.moveTo(bx-rv-4,cy+oy);ctx.lineTo(bx-rv-rv*.65,cy+oy);ctx.stroke();});
    ctx.globalAlpha=1;
  }
}

function dTree(o){

// ── storm cloud ───────────────────────────────────────
function dStormCloud(s){
  s.flash=(s.flash||0);if(Math.random()<.04)s.flash=6;if(s.flash>0)s.flash--;
  const sw=s.rx*2,sh=s.ry*2+50;
  if(SPR.storm){

    ctx.globalAlpha=1;ctx.restore();

      ctx.globalAlpha=.15;ctx.fillStyle='#FFE040';
      ctx.beginPath();ctx.ellipse(s.x,s.y,sw*.6,sh*.4,0,0,6.28);ctx.fill();
      ctx.globalAlpha=1;
    }
  }
}

// ── bird ──────────────────────────────────────────────
function dBird(b){
  // faster wing flap
  b.wing+=b.wingDir*.22;
  if(b.wing>1)  {b.wing=1; b.wingDir=-1;}
  if(b.wing<-1) {b.wing=-1;b.wingDir=1;}

  const col=timeIdx===3?'#9898B8':'#2A1808';
  const wf=b.wing; // -1..1, 0=level, 1=up, -1=down
  const wx=22;     // half wingspan

  ctx.save();
  ctx.translate(b.x,b.y);
  if(b.vx<0)ctx.scale(-1,1); // flip for rightward birds

  // left wing — curves up/down
  ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.quadraticCurveTo(-wx*.55, wf*-12, -wx, wf*-10);
  ctx.stroke();
  // wing trailing edge
  ctx.beginPath();
  ctx.moveTo(-wx*.2,0);
  ctx.quadraticCurveTo(-wx*.6, wf*-14+2, -wx+2, wf*-11+3);
  ctx.stroke();

  // right wing
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.quadraticCurveTo(wx*.55, wf*-12, wx, wf*-10);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(wx*.2,0);
  ctx.quadraticCurveTo(wx*.6, wf*-14+2, wx-2, wf*-11+3);
  ctx.stroke();

  // body
  ctx.fillStyle=col;
  ctx.beginPath();ctx.ellipse(0,0,8,4,-.2,0,6.28);ctx.fill();

  // head
  ctx.beginPath();ctx.arc(-7,-1,5,0,6.28);ctx.fill();

  // beak
  ctx.fillStyle='#9B7520';
  ctx.beginPath();ctx.moveTo(-12,-1);ctx.lineTo(-17,0);ctx.lineTo(-12,2);ctx.closePath();ctx.fill();

  // eye
  ctx.fillStyle='white';ctx.beginPath();ctx.arc(-8,-2,1.8,0,6.28);ctx.fill();
  ctx.fillStyle='#111';ctx.beginPath();ctx.arc(-8,-2,1,0,6.28);ctx.fill();

  // tail feathers
  ctx.strokeStyle=col;ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(8,0);ctx.lineTo(15,4);ctx.stroke();
  ctx.beginPath();ctx.moveTo(8,0);ctx.lineTo(15,-3);ctx.stroke();
  ctx.beginPath();ctx.moveTo(8,0);ctx.lineTo(16,1);ctx.stroke();

  ctx.restore();

  // warning arrow if coming from behind
  if(b.vx>0&&b.x>0&&b.x<bal.x+110&&b.x>bal.x-30){
    ctx.fillStyle='rgba(255,50,50,.88)';
    ctx.beginPath();ctx.moveTo(b.x-16,b.y-8);ctx.lineTo(b.x-26,b.y);ctx.lineTo(b.x-16,b.y+8);ctx.closePath();ctx.fill();
  }
}

// ── pickup ────────────────────────────────────────────
function dPickup(p){
  p.pulse=(p.pulse+.08)%6.28;const sc=1+Math.sin(p.pulse)*.12;
  ctx.save();ctx.translate(p.x,p.y);ctx.scale(sc,sc);
  const S={gas:['#FFB300','#E65100','⛽'],invincible:['rgba(90,170,255,.92)','#1555C0','🛡'],life:['rgba(255,110,110,.92)','#C02020','❤️'],speed:['rgba(170,110,255,.92)','#4A10A0','⚡'],magnet:['rgba(255,80,160,.92)','#AA0060','🧲'],tiny:['rgba(80,220,180,.92)','#006644','🫧'],turbo:['rgba(255,160,30,.92)','#B04000','🚀']}[p.type]||['#aaa','#555','?'];
  ctx.fillStyle=S[0];ctx.strokeStyle=S[1];ctx.lineWidth=2;
  if(p.type==='gas'){ctx.beginPath();ctx.roundRect(-p.r,-p.r,p.r*2,p.r*2,5);ctx.fill();ctx.stroke();}
  else{ctx.beginPath();ctx.arc(0,0,p.r,0,6.28);ctx.fill();ctx.stroke();}
  ctx.font='bold 15px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#000';
  ctx.fillText(S[2],0,1);ctx.restore();
}
function dParts(){
  parts.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,6.28);ctx.fill();});

}
function updLives(){lvEl.innerHTML='';for(let i=0;i<3;i++){const s=document.createElement('span');s.textContent=i<lives?'❤️':'🖤';lvEl.appendChild(s);}}
function addParts(x,y,cols,n=12){for(let i=0;i<n;i++){const a=rnd(0,6.28),sp=rnd(1.5,4);parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,life:1,r:rnd(3,6),col:cols[Math.floor(rnd(0,cols.length))]});}}

function spawnTree(){

function die(){
  if(inv>0||dieCD>0)return;
  lives--;updLives();
  addParts(bal.x,bal.y,['#E53935','#FFB300','#42A5F5'],18);
  dieCD=150;
  if(lives<=0){st='dead';sndDie();maybePromptScore(score);loadDeadTop();}
  else{inv=INV_MAX;gas=Math.max(gas,0.45);bal.y=Math.min(bal.y,GY()-60);bal.vy=-10;sndHit();}
}

function hitCircle(ox,oy,or){const r=tiny>0?R_HIT()*.55:R_HIT();return Math.hypot(bal.x-ox,bal.y-oy)<r+or;}
function hitRect(rx,ry,rw,rh){const r=tiny>0?R_HIT()*.55:R_HIT();const nx=Math.max(rx,Math.min(bal.x,rx+rw));const ny=Math.max(ry,Math.min(bal.y,ry+rh));return Math.hypot(bal.x-nx,bal.y-ny)<r;}
function hitEllipse(ox,oy,erx,ery){const r=tiny>0?R_HIT()*.55:R_HIT();const dx=(bal.x-ox)/(erx+r),dy=(bal.y-oy)/(ery+r);return dx*dx+dy*dy<1;}

function update(){
  fr++;scrollX+=spd;score+=spd*.05;
  spd=Math.min(9,3.5+score*.009);
  gasDecay=0.00065+score*.0000008;
  timeTimer++;if(timeTimer>3600){timeTimer=0;timeIdx=(timeIdx+1)%TIMES.length;}
  // burner sound — on/off with lift
  if(lift&&gas>0){if(!burnerNode)sndBurnerOn();}else{if(burnerNode)sndBurnerOff();}

  const ni=LOCS.findIndex((l,i)=>score>=l.d&&(i===LOCS.length-1||score<LOCS[i+1].d));
  if(ni!==locIdx){locIdx=ni;initBgBuildings();lbEl.textContent='📍 '+LOCS[locIdx].n;lbEl.style.opacity='1';lbTimer=200;sndLocChange();}
  if(lbTimer>0){lbTimer--;if(lbTimer===0)lbEl.style.opacity='0';}
  if(dieCD>0)dieCD--;
  if(fr>240)hnEl.style.display='none';

  gas-=gasDecay;if(gas<0)gas=0;
  const lf=boost>0?LIFT_B:LIFT,gr=boost>0?GRAV_B:GRAV;
  if(lift&&gas>0)bal.vy+=lf;
  bal.vy+=gr;
  bal.vy=Math.max(-VMAX,Math.min(VMAX,bal.vy));
  bal.vy*=DAMP;
  bal.y+=bal.vy;

  const gy=GY(),cy2=CY();
  if(bal.y<cy2){bal.y=cy2;if(bal.vy<0)bal.vy=0;}
  if(bal.y>gy){bal.y=gy;if(bal.vy>0)bal.vy=0;if(st==='play'&&dieCD===0)die();}

  if(inv>0)inv--;if(boost>0)boost--;if(magnet>0)magnet--;if(tiny>0)tiny--;
  if(turbo>0){turbo--;score+=0.8;}
  bal.x=BX();
  clouds.forEach(c=>{c.x-=c.spd;if(c.x<-80)c.x=W+80;});

  const gasInt=gas<0.3?90:gas<0.6?130:185;
  if(fr-lastGas>gasInt){spawnGas();lastGas=fr;}
  if(fr-lastT>Math.max(60,170-score*.2)){spawnTree();lastT=fr;}
  if(fr-lastP>Math.max(200,420-score*.4)){spawnPickup();lastP=fr;}
  if(fr-lastBird>rnd(180,300)){spawnBird();lastBird=fr;}
  if(fr-lastStorm>Math.max(300,500-score*.3)){spawnStormCloud();lastStorm=fr;}

  if(magnet>0){pkups.forEach(p=>{const dx=bal.x-p.x,dy=bal.y-p.y,d=Math.hypot(dx,dy);if(d<220&&d>1){p.x+=dx/d*4;p.y+=dy/d*4;}});}

  trees=trees.filter(o=>{o.x-=spd;if(o.x<bal.x+80&&o.x+o.w>bal.x-20){if(hitRect(o.x,o.y,o.w,o.h)&&st==='play'){die();return false;}}return o.x>-(o.w+20);});
  stormClouds=stormClouds.filter(s=>{s.x-=spd*.8;if(hitEllipse(s.x,s.y,s.rx,s.ry)&&st==='play'){die();return false;}return s.x>-s.rx-20;});
  pkups=pkups.filter(p=>{
    p.x-=spd;
    if(hitCircle(p.x,p.y,p.r)){
      if(p.type==='gas')       {gas=Math.min(1,gas+.55);addParts(p.x,p.y,['#FFB300','#FF7043','#5DCAA5']);sndGas();}
      else if(p.type==='invincible'){inv=INV_MAX;addParts(p.x,p.y,['#64B5F6','#E3F2FD']);sndShield();}
      else if(p.type==='life') {lives=Math.min(3,lives+1);updLives();addParts(p.x,p.y,['#EF9A9A','#E53935']);sndLife();}
      else if(p.type==='speed'){boost=240;boostMax=240;addParts(p.x,p.y,['#CE93D8','#9C27B0']);sndPickup();}
      else if(p.type==='magnet'){magnet=300;addParts(p.x,p.y,['#FF80C0','#FF2080']);sndMagnet();}
      else if(p.type==='tiny') {tiny=360;addParts(p.x,p.y,['#80FFCC','#00AA66']);sndTiny();}
      else if(p.type==='turbo'){turbo=180;score+=200;addParts(p.x,p.y,['#FFA030','#FF4000']);sndTurbo();}
      return false;
    }
    return p.x>-40;
  });
  const nearB=birds.find(b=>b.vx>0&&b.x>0&&b.x<bal.x+140&&Math.abs(b.y-bal.y)<80);
  if(nearB)birdWarnT=35;if(birdWarnT>0)birdWarnT--;
  bwEl.style.opacity=birdWarnT>0?'1':'0';
  birds=birds.filter(b=>{b.x+=b.vx;b.y+=b.vy;b.vy+=.018;b.vy*=.95;if(hitCircle(b.x,b.y,10)&&st==='play'){die();return false;}return b.x>-100&&b.x<W+100;});
  parts=parts.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.07;p.life-=.04;return p.life>0;});

  gfEl.style.width=(Math.max(0,gas)*100)+'%';
  gfEl.style.background=gas>.5?'#5DCAA5':gas>.25?'#EF9F27':'#E24B4A';
  bf2El.style.width=(boost/Math.max(1,boostMax)*100)+'%';
  scEl.textContent=Math.floor(score)+' м';
  hbEl.textContent='📍 '+LOCS[locIdx].n+' \u00a0⏱ '+TIMES[timeIdx].n;
  if(gas<=0&&bal.vy<VMAX)bal.vy=Math.min(bal.vy+.3,VMAX);
}

function drawStart(){
  dSky();clouds.forEach(dCloud);dHills();dBgBuildings();dGround();
  const fs=Math.max(11,Math.min(13,W*.026));
  const titleFs=Math.max(15,Math.min(20,W*.038));
  const bw=Math.min(340,W-28);
  const cx=W/2;
  // draw leaderboard top-3 first (top-left area)
  if(startTop3&&startTop3.length){
    const lbw=Math.min(220,W*.38),lbx=16,lby=48;
    ctx.fillStyle='rgba(0,0,0,.55)';
    ctx.beginPath();ctx.roundRect(lbx,lby,lbw,startTop3.length*28+36,12);ctx.fill();
    ctx.fillStyle='#FFD700';ctx.font=`bold ${Math.max(11,fs-1)}px sans-serif`;
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText('🏆 Лидеры',lbx+10,lby+8);
    const medals=['🥇','🥈','🥉'];
    startTop3.slice(0,3).forEach((e,i)=>{
      ctx.fillStyle=i===0?'#FFD700':'rgba(255,255,255,.85)';
      ctx.font=`${Math.max(10,fs-1)}px sans-serif`;
      const txt=`${medals[i]} ${e.name}  ${e.score}м`;
      ctx.fillText(txt,lbx+8,lby+30+i*26);
    });
    ctx.textAlign='center';
  }
  // main info panel — centered
  const lineH=fs+9;
  const lines=[
    'Облетай деревья, тучи и птиц',
    '⛽ газ  🛡 щит  ❤️ жизнь  ⚡ подъём',
    '🧲 магнит  🫧 малыш  🚀 турбо',
    'Кунгур → Пермь → Москва',
  ];
  const btnH=Math.max(34,H*.052);
  const bh=titleFs+14+lines.length*(lineH)+btnH+24+12;
  const bx2=cx-bw/2,by2=H/2-bh/2;
  ctx.fillStyle='rgba(0,0,0,.65)';
  ctx.beginPath();ctx.roundRect(bx2,by2,bw,bh,16);ctx.fill();
  ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='top';
  ctx.font=`bold ${titleFs}px sans-serif`;
  ctx.fillText('🎈 Кунгурские аэронавты',cx,by2+12);
  ctx.font=`${fs}px sans-serif`;
  lines.forEach((t,i)=>{
    ctx.fillStyle=i<3?'rgba(255,255,255,.78)':'rgba(255,255,255,.5)';
    ctx.fillText(t,cx,by2+titleFs+18+i*lineH);
  });
  const btnY=by2+bh-btnH-10;
  const btnW=Math.min(bw-28,260);
  ctx.fillStyle='#FFB300';ctx.beginPath();ctx.roundRect(cx-btnW/2,btnY,btnW,btnH,10);ctx.fill();
  ctx.fillStyle='#3A2000';
  ctx.font=`bold ${Math.max(12,Math.min(15,W*.030))}px sans-serif`;
  ctx.textBaseline='middle';
  ctx.fillText('▶  Нажми / коснись экрана',cx,btnY+btnH/2);
}
function drawDead(){
  ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(0,0,W,H);
  const cx=W/2;
  ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font=`bold ${Math.min(26,W*.042)}px sans-serif`;ctx.fillText('Полёт завершён 💨',cx,H*.2);
  ctx.font=`${Math.min(18,W*.028)}px sans-serif`;ctx.fillStyle='#FFD54F';
  ctx.fillText('Пройдено: '+Math.floor(score)+' м',cx,H*.28);
  ctx.fillStyle='rgba(255,255,255,.7)';ctx.font=`${Math.min(13,W*.022)}px sans-serif`;
  ctx.fillText('Достигнуто: '+LOCS.filter(l=>score>=l.d).pop().n,cx,H*.34);
  // mini leaderboard on dead screen
  if(deadTop&&deadTop.length){
    const lbw=Math.min(320,W-40),lbh=deadTop.length*34+44;
    const lbx=cx-lbw/2,lby=H*.4;
    ctx.fillStyle='rgba(10,8,20,.75)';ctx.beginPath();ctx.roundRect(lbx,lby,lbw,lbh,14);ctx.fill();
    ctx.strokeStyle='rgba(255,215,0,.3)';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle='#FFD700';ctx.font=`bold ${Math.min(13,W*.025)}px sans-serif`;ctx.textBaseline='top';
    ctx.fillText('🏆 Топ игроков',cx,lby+10);
    const medals=['🥇','🥈','🥉'];
    deadTop.slice(0,5).forEach((e,i)=>{
      const ey=lby+36+i*32;
      // highlight current player score
      const isMe=e.score===Math.floor(score)&&i<3;
      ctx.fillStyle=isMe?'rgba(255,215,0,.2)':'transparent';
      if(isMe){ctx.beginPath();ctx.roundRect(lbx+6,ey-4,lbw-12,28,6);ctx.fill();}
      ctx.fillStyle=i===0?'#FFD700':'rgba(255,255,255,.85)';
      ctx.font=`${Math.min(12,W*.022)}px sans-serif`;
      ctx.textAlign='left';ctx.fillText(`${medals[i]||i+1}  ${e.name}`,lbx+14,ey);
      ctx.textAlign='right';ctx.fillStyle='#FFD700';
      ctx.fillText(e.score+' м',lbx+lbw-14,ey);
      ctx.textAlign='center';
    });
  }
  ctx.fillStyle='#FFB300';ctx.font=`bold ${Math.min(15,W*.026)}px sans-serif`;
  ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('▶  Нажми / коснись снова',cx,H*.9);
}

function draw(){
  ctx.clearRect(0,0,W,H);
  if(st==='start'){drawStart();return;}
  dSky();dStars();dSun();
  // back layer clouds (smaller, further)
  clouds.filter(c=>c.layer===0).forEach(dCloud);
  dHills();
  dBgBuildings();
  // front layer clouds (bigger, closer)
  clouds.filter(c=>c.layer===1).forEach(dCloud);
  stormClouds.forEach(dStormCloud);
  trees.forEach(dTree);
  pkups.forEach(dPickup);
  birds.forEach(dBird);
  dGround();dParts();
  const flame=lift&&gas>0,blink=inv>0&&Math.floor(fr/6)%2===0;
  if(!blink)dBalloon(bal.x,bal.y,flame);
  if(inv>0)dBalloon(bal.x,bal.y,flame);
  if(st==='dead')drawDead();
}

function reset(){
  resize();
  if(burnerNode)sndBurnerOff();
  bal={x:BX(),y:H/2,vy:0};
  trees=[];stormClouds=[];pkups=[];birds=[];parts=[];
  score=0;gas=1;lives=3;spd=3.5;scrollX=0;fr=0;
  lastT=0;lastP=0;lastBird=0;lastGas=0;lastStorm=0;
  inv=0;boost=0;boostMax=0;dieCD=0;magnet=0;tiny=0;turbo=0;
  timeIdx=0;timeTimer=0;locIdx=0;
  hnEl.style.display='block';lbEl.style.opacity='0';bwEl.style.opacity='0';
  document.getElementById('record-prompt').style.display='none';
  document.getElementById('lb-panel').style.display='none';
  initClouds();initStars();initBgBuildings();updLives();
  sndStart();
  loadTop3();
  st='play';
}
function handle(dn){
  initAudio();
  // если открыт промпт имени — не перехватываем тап
  if(document.getElementById('record-prompt').style.display==='block') return;
  if(document.getElementById('lb-panel').style.display==='block') return;
  if((st==='start'||st==='dead')&&dn){reset();return;}
  if(st==='play')lift=dn;
}
cv.addEventListener('mousedown',()=>handle(true));
cv.addEventListener('mouseup',()=>handle(false));
cv.addEventListener('mouseleave',()=>{if(st==='play')lift=false;});
cv.addEventListener('touchstart',e=>{e.preventDefault();handle(true);},{passive:false});
cv.addEventListener('touchend',e=>{e.preventDefault();handle(false);},{passive:false});
cv.addEventListener('touchcancel',e=>{e.preventDefault();handle(false);},{passive:false});
window.addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();handle(true);}});
window.addEventListener('keyup',e=>{if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();handle(false);}});

initSprites();
initClouds();initStars();initBgBuildings();updLives();
// load top3 and visitor count on startup
loadTop3();
getVisitorCount().then(n=>{
  if(n>0)document.getElementById('visitor-cnt').textContent='👥 '+n+' игроков';
});
(function loop(){if(st==='play')update();draw();requestAnimationFrame(loop);})();
})();
</script>
</body>
</html>
