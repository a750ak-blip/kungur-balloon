<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎈 Кунгурские аэронавты</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#111;overflow:hidden;font-family:system-ui,sans-serif;user-select:none;-webkit-user-select:none;touch-action:none}
#wrap{position:relative;width:100vw;height:100vh}
#gc{display:block;width:100%;height:100%;cursor:pointer}
#ui{position:absolute;top:0;left:0;right:0;pointer-events:none;padding:10px 14px;display:flex;gap:8px;align-items:flex-start}
.bw{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0}
.bl{font-size:12px;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.8);font-weight:600}
.bb{width:100%;height:10px;border-radius:5px;background:rgba(0,0,0,.4);overflow:hidden}
.bf{height:100%;border-radius:5px;transition:width .1s,background .3s}
#lv{display:flex;gap:2px;align-items:center;background:rgba(0,0,0,.4);border-radius:8px;padding:4px 8px;font-size:16px}
#sc{background:rgba(0,0,0,.4);border-radius:8px;padding:4px 12px;color:#fff;font-size:14px;font-weight:600;text-shadow:0 1px 3px rgba(0,0,0,.7);white-space:nowrap}
#hb{position:absolute;bottom:8px;left:10px;pointer-events:none;background:rgba(0,0,0,.35);border-radius:8px;padding:4px 12px;color:rgba(255,255,255,.9);font-size:12px}
#hn{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.5);border-radius:10px;padding:6px 16px;color:#fff;font-size:13px;pointer-events:none;white-space:nowrap}
#lb{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;opacity:0;transition:opacity .4s;background:rgba(0,0,0,.6);border-radius:14px;padding:12px 28px;color:#fff;font-size:22px;font-weight:700;white-space:nowrap}
#bw2{position:absolute;right:14px;top:50%;transform:translateY(-50%);pointer-events:none;opacity:0;transition:opacity .2s;background:rgba(200,30,30,.85);border-radius:10px;padding:6px 12px;color:#fff;font-size:13px;font-weight:700}
</style>
</head>

  const img=new Image();

  img.onload=()=>{
    const oc=document.createElement('canvas');
    oc.width=sw;oc.height=sh;
    const octx=oc.getContext('2d');
    octx.drawImage(img,0,0,sw,sh);
    SPR[key]=oc;
    URL.revokeObjectURL(url);
  };
  img.src=url;
}

// ── init ──────────────────────────────────────────────
function initStars(){stars=[];for(let i=0;i<80;i++)stars.push({x:rnd(0,W),y:rnd(0,H*.6),r:rnd(.4,2),t:rnd(0,6.28)});}
function initClouds(){clouds=[];for(let i=0;i<8;i++)clouds.push({x:rnd(0,W),y:rnd(15,H*.28),rx:rnd(30,70),ry:rnd(14,28),spd:rnd(.2,.5),a:rnd(.55,.9)});}
function initBgDecor(){
  bgD=[];const by=H-50;
  if(locIdx===0){
    bgD.push({t:'stela',x:rnd(W*.55,W*.82),y:by});
    bgD.push({t:'church',x:rnd(W*.08,W*.42),y:by,s:0});
    bgD.push({t:'church',x:rnd(W*.48,W*.88),y:by,s:1});
  } else if(locIdx===1){
    for(let i=0;i<3;i++)bgD.push({t:'church',x:rnd(W*.05,W*.95),y:by,s:i%3});
  } else {
    bgD.push({t:'kremlin',x:rnd(W*.62,W*.82),y:by});
    bgD.push({t:'church',x:rnd(W*.05,W*.42),y:by,s:2});
  }
}
function initBgBuildings(){
  bgB=[];
  const pals=[['#8B7355','#7A6648','#9B8365'],['#546E7A','#607D8B','#455A64'],['#3A3A3A','#555','#2A2A2A']];
  const cols=pals[locIdx];const n=Math.ceil(W/55)+2;
  for(let i=0;i<n;i++)bgB.push({x:i*(W/n)+rnd(0,25),w:rnd(28,68),h:locIdx===0?rnd(30,80):rnd(50,130),col:cols[Math.floor(rnd(0,cols.length))],win:locIdx>0});
  initBgDecor();
}

// ── draw helpers ──────────────────────────────────────
function dSky(){
  const c=TIMES[timeIdx].sky,g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,c[0]);g.addColorStop(.4,c[1]);g.addColorStop(.75,c[2]);g.addColorStop(1,c[3]);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
}
function dStars(){
  if(timeIdx!==3)return;
  stars.forEach(s=>{s.t+=.04;ctx.globalAlpha=.35+Math.sin(s.t)*.55;ctx.fillStyle='#E0E8FF';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,6.28);ctx.fill();});
  ctx.globalAlpha=1;
}
function dSun(){
  const t=TIMES[timeIdx],sx=W*.87,sy=H*t.sunY;
  ctx.fillStyle=t.sun;ctx.beginPath();ctx.arc(sx,sy,timeIdx===3?15:20,0,6.28);ctx.fill();
}
function dCloud(c){
  const isN=timeIdx===3;
  ctx.fillStyle=isN?`rgba(60,80,120,${c.a})`:`rgba(255,255,255,${c.a})`;
  ctx.beginPath();ctx.ellipse(c.x,c.y,c.rx,c.ry,0,0,6.28);ctx.fill();
  ctx.beginPath();ctx.ellipse(c.x-c.rx*.4,c.y+4,c.rx*.6,c.ry*.7,0,0,6.28);ctx.fill();
  ctx.beginPath();ctx.ellipse(c.x+c.rx*.4,c.y+3,c.rx*.62,c.ry*.6,0,0,6.28);ctx.fill();
}
function dGround(){
  const n=timeIdx===3;
  const g=locIdx===0?(n?{m:'#2A4A1A',d:'#1A3A0A',l:'#3A5A2A'}:{m:'#5A8A3C',d:'#4A7A2C',l:'#6AAA4A'})
         :locIdx===1?(n?{m:'#2A3A4A',d:'#1A2A3A',l:'#3A4A5A'}:{m:'#5A7A8A',d:'#4A6A7A',l:'#6A8A9A'})
                    :(n?{m:'#2A2A3A',d:'#1A1A2A',l:'#3A3A4A'}:{m:'#5A5A6A',d:'#4A4A5A',l:'#6A6A7A'});
  ctx.fillStyle=g.m;ctx.fillRect(0,H-50,W,50);
  ctx.fillStyle=g.d;ctx.fillRect(0,H-50,W,8);
  const nc=Math.ceil(W/40)+2;
  for(let i=0;i<nc;i++){const gx=(i*71+scrollX*.3)%W;ctx.fillStyle=g.l;ctx.beginPath();ctx.ellipse(gx,H-50,10,5,0,0,6.28);ctx.fill();}
}

function dSpr(key,cx,cy,tw,th){
  const s=SPR[key];if(!s)return;

}

  ctx.fillStyle='#948470';ctx.font=`bold ${8*s}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';

  ctx.fillStyle='#A49070';for(let i=0;i<4;i++)ctx.fillRect(-13*s,(-166+i*18)*s,26*s,7*s);

}

  ctx.fillStyle='#FFF';ctx.beginPath();ctx.arc(0,-140,12,0,6.28);ctx.fill();
  ctx.strokeStyle='#444';ctx.lineWidth=1.5;ctx.stroke();
  ctx.strokeStyle='#222';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,-140);ctx.lineTo(4,-132);ctx.stroke();

function dBgBuildings(){
  bgB.forEach(b=>{
    b.x-=spd*.12;if(b.x<-b.w)b.x=W+b.w;
    ctx.fillStyle=b.col;ctx.fillRect(b.x,H-50-b.h,b.w,b.h);
    if(b.win&&timeIdx===3){
      ctx.fillStyle='rgba(255,225,90,.45)';
      for(let wy=H-50-b.h+8;wy<H-58;wy+=13)
        for(let wx=b.x+5;wx<b.x+b.w-7;wx+=11)
          if(Math.random()<.45)ctx.fillRect(wx,wy,5,7);
    }
  });
  bgD.forEach(d=>{
    d.x-=spd*.09;if(d.x<-160)d.x=W+160;
    if(d.t==='stela')dStela(d.x,d.y);
    else if(d.t==='kremlin')dKremlin(d.x,d.y);
    else{
      const key='church'+d.s;
      const sizes=[[92,245],[80,205],[100,195]];
      const [sw,sh]=sizes[d.s];
      const scale=Math.min(1,H*.45/sh);
      dSpr(key,d.x,d.y,sw*scale,sh*scale);
    }
  });
}

// ── balloon ───────────────────────────────────────────
function dBalloon(bx,by,flame){
  const rv=R_VIS(),wb=Math.sin(fr*.06)*1.4,cy=by+wb;
  // draw sprite (160x200 viewBox scaled to rv*2 wide)
  const scale=(rv*2)/160;
  const sw=160*scale,sh=200*scale;
  // balloon origin in SVG is center of sphere at (0,0), basket ends at y=133
  // we want sphere center at cy, so top = cy - 92*scale
  if(SPR.balloon){
    ctx.drawImage(SPR.balloon, bx-sw/2, cy-92*scale, sw, sh);
  }
  // flame inside balloon
  if(flame){
    const t=fr*.08;
    const jit1=Math.sin(t*1.7)*rv*.08,jit2=Math.sin(t*2.3+1)*rv*.06;
    ctx.save();
    ctx.beginPath();ctx.ellipse(bx,cy,rv*.9,rv*.95,0,0,6.28);ctx.clip();
    ctx.fillStyle='rgba(255,80,0,.78)';
    ctx.beginPath();
    ctx.moveTo(bx-rv*.2,cy+rv*.65);
    ctx.quadraticCurveTo(bx-rv*.25+jit1,cy+rv*.2,bx+jit1*.5,cy+rv*.1);
    ctx.quadraticCurveTo(bx+rv*.25+jit2,cy+rv*.2,bx+rv*.2,cy+rv*.65);
    ctx.closePath();ctx.fill();
    ctx.fillStyle='rgba(255,150,0,.88)';
    ctx.beginPath();
    ctx.moveTo(bx-rv*.13,cy+rv*.62);
    ctx.quadraticCurveTo(bx-rv*.15+jit2,cy+rv*.28,bx+jit2*.3,cy+rv*.16);
    ctx.quadraticCurveTo(bx+rv*.15+jit1,cy+rv*.28,bx+rv*.13,cy+rv*.62);
    ctx.closePath();ctx.fill();
    ctx.fillStyle='rgba(255,220,30,.92)';
    ctx.beginPath();
    ctx.moveTo(bx-rv*.07,cy+rv*.58);
    ctx.quadraticCurveTo(bx+jit1*.2,cy+rv*.35,bx+rv*.07,cy+rv*.58);
    ctx.closePath();ctx.fill();
    // sparks
    for(let i=0;i<4;i++){
      const sx=bx+Math.sin(t*3+i*1.5)*rv*.18;
      const sy=cy+rv*.18-i*rv*.07+Math.sin(t*2+i)*rv*.04;
      ctx.fillStyle=`rgba(255,${180+Math.floor(Math.random()*75)},0,.8)`;
      ctx.beginPath();ctx.arc(sx,sy,rv*.03,0,6.28);ctx.fill();
    }
    ctx.restore();
  }
  // boosts glows
  if(inv>0){
    ctx.globalAlpha=(.4+Math.sin(fr*.18)*.4)*(inv/INV_MAX);
    ctx.strokeStyle='#82CFFF';ctx.lineWidth=5;ctx.beginPath();ctx.ellipse(bx,cy,rv+5,rv+5,0,0,6.28);ctx.stroke();
    ctx.globalAlpha=1;
  }
  if(magnet>0){
    ctx.globalAlpha=.25+Math.sin(fr*.25)*.25;
    ctx.strokeStyle='#FF80C0';ctx.lineWidth=4;ctx.beginPath();ctx.ellipse(bx,cy,rv+10,rv+10,0,0,6.28);ctx.stroke();
    ctx.strokeStyle='rgba(255,80,160,.12)';ctx.lineWidth=2;ctx.setLineDash([6,6]);
    ctx.beginPath();ctx.arc(bx,cy,220,0,6.28);ctx.stroke();ctx.setLineDash([]);
    ctx.globalAlpha=1;
  }
  if(turbo>0){
    ctx.globalAlpha=.5+Math.sin(fr*.3)*.3;ctx.strokeStyle='#FFA030';ctx.lineWidth=3;
    [-rv*.5,-rv*.1,rv*.25].forEach(oy=>{ctx.beginPath();ctx.moveTo(bx-rv-4,cy+oy);ctx.lineTo(bx-rv-rv*.65,cy+oy);ctx.stroke();});
    ctx.globalAlpha=1;
  }
}

// ── tree ──────────────────────────────────────────────
function dTree(o){
  const treeKey='tree'+o.variant;
  const srcW=[104,130,100][o.variant];
  const srcH=[165,200,200][o.variant];
  const scale=o.h/srcH;
  dSpr(treeKey,o.x+o.w/2,o.y+o.h,o.w,o.h);
  if(!SPR[treeKey]){
    // fallback
    ctx.fillStyle='#5C3310';ctx.fillRect(o.x+12,o.y,12,o.h);
    ctx.fillStyle='#2E7D32';ctx.beginPath();ctx.moveTo(o.x,o.y+o.h*.4);ctx.lineTo(o.x+o.w/2,o.y);ctx.lineTo(o.x+o.w,o.y+o.h*.4);ctx.closePath();ctx.fill();
  }
}

// ── storm cloud ───────────────────────────────────────
function dStormCloud(s){
  s.flash=(s.flash||0);if(Math.random()<.04)s.flash=6;if(s.flash>0)s.flash--;
  const sw=s.rx*2,sh=s.ry*2+50;
  if(SPR.storm){
    ctx.save();
    if(s.flash>0){ctx.globalAlpha=.88+s.flash*.02;}
    ctx.drawImage(SPR.storm,s.x-sw/2,s.y-s.ry,sw,sh);
    ctx.globalAlpha=1;ctx.restore();
    if(s.flash>0){
      ctx.globalAlpha=.15;ctx.fillStyle='#FFE040';
      ctx.beginPath();ctx.ellipse(s.x,s.y,sw*.6,sh*.4,0,0,6.28);ctx.fill();
      ctx.globalAlpha=1;
    }
  }
}

// ── bird ──────────────────────────────────────────────
function dBird(b){
  b.wing+=b.wingDir*.14;if(b.wing>.5||b.wing<-.5)b.wingDir*=-1;
  const sc=1+b.wing*.15;
  if(SPR.bird){
    ctx.save();ctx.translate(b.x,b.y);
    if(b.vx<0)ctx.scale(-1,1);
    ctx.scale(1,sc);
    ctx.drawImage(SPR.bird,-38,-14,76,28);
    ctx.restore();
  } else {
    const col=timeIdx===3?'#9898B8':'#281808';
    ctx.strokeStyle=col;ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(b.x-16,b.y-b.wing*16);ctx.quadraticCurveTo(b.x,b.y,b.x+16,b.y-b.wing*16);ctx.stroke();
    ctx.fillStyle=col;ctx.beginPath();ctx.ellipse(b.x,b.y,6,4,0,0,6.28);ctx.fill();
  }
  if(b.vx>0&&b.x>0&&b.x<bal.x+100&&b.x>bal.x-30){
    ctx.fillStyle='rgba(255,60,60,.85)';
    ctx.beginPath();ctx.moveTo(b.x-14,b.y-7);ctx.lineTo(b.x-24,b.y);ctx.lineTo(b.x-14,b.y+7);ctx.closePath();ctx.fill();
  }
}

// ── pickup ────────────────────────────────────────────
function dPickup(p){
  p.pulse=(p.pulse+.08)%6.28;const sc=1+Math.sin(p.pulse)*.12;
  ctx.save();ctx.translate(p.x,p.y);ctx.scale(sc,sc);
  const S={gas:['#FFB300','#E65100','⛽'],invincible:['rgba(90,170,255,.92)','#1555C0','🛡'],life:['rgba(255,110,110,.92)','#C02020','❤️'],speed:['rgba(170,110,255,.92)','#4A10A0','⚡'],magnet:['rgba(255,80,160,.92)','#AA0060','🧲'],tiny:['rgba(80,220,180,.92)','#006644','🫧'],turbo:['rgba(255,160,30,.92)','#B04000','🚀']}[p.type]||['#aaa','#555','?'];
  ctx.fillStyle=S[0];ctx.strokeStyle=S[1];ctx.lineWidth=2;
  if(p.type==='gas'){ctx.beginPath();ctx.roundRect(-p.r,-p.r,p.r*2,p.r*2,5);ctx.fill();ctx.stroke();}
  else{ctx.beginPath();ctx.arc(0,0,p.r,0,6.28);ctx.fill();ctx.stroke();}
  ctx.font='bold 15px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#000';
  ctx.fillText(S[2],0,1);ctx.restore();
}
function dParts(){
  parts.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,6.28);ctx.fill();});
  ctx.globalAlpha=1;
}
function updLives(){lvEl.innerHTML='';for(let i=0;i<3;i++){const s=document.createElement('span');s.textContent=i<lives?'❤️':'🖤';lvEl.appendChild(s);}}
function addParts(x,y,cols,n=12){for(let i=0;i<n;i++){const a=rnd(0,6.28),sp=rnd(1.5,4);parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,life:1,r:rnd(3,6),col:cols[Math.floor(rnd(0,cols.length))]});}}

function spawnTree(){
  const h=rnd(H*.22,H*.38);
  const variant=Math.floor(rnd(0,3));
  const widths=[104,130,100];
  const scale=h/[165,200,200][variant];
  trees.push({x:W+30,y:H-50-h,w:widths[variant]*scale,h,variant});
}
function spawnPickup(){
  const T=['invincible','life','speed','magnet','tiny','turbo'];
  pkups.push({type:T[Math.floor(rnd(0,T.length))],x:W+30,y:rnd(H*.14,H*.62),r:15,pulse:0});
}
function spawnGas(){pkups.push({type:'gas',x:W+30,y:rnd(H*.18,H*.62),r:16,pulse:0});}
function spawnStormCloud(){
  const rx=rnd(48,72),ry=rnd(22,36);
  stormClouds.push({x:W+rx+20,y:rnd(H*.1,H*.48),rx,ry,flash:0});
}
function spawnBird(){
  const y=rnd(H*.1,H*.5);const dir=Math.random()<.5?1:-1;
  birds.push({x:dir===1?-40:W+40,y,vy:0,vx:rnd(1.8,3.2)*dir,wing:0,wingDir:1});
}

function die(){
  if(inv>0||dieCD>0)return;
  lives--;updLives();
  addParts(bal.x,bal.y,['#E53935','#FFB300','#42A5F5'],18);
  dieCD=150;
  if(lives<=0){st='dead';}
  else{inv=INV_MAX;gas=Math.max(gas,0.45);bal.y=Math.min(bal.y,GY()-60);bal.vy=-10;}
}

function hitCircle(ox,oy,or){const r=tiny>0?R_HIT()*.55:R_HIT();return Math.hypot(bal.x-ox,bal.y-oy)<r+or;}
function hitRect(rx,ry,rw,rh){const r=tiny>0?R_HIT()*.55:R_HIT();const nx=Math.max(rx,Math.min(bal.x,rx+rw));const ny=Math.max(ry,Math.min(bal.y,ry+rh));return Math.hypot(bal.x-nx,bal.y-ny)<r;}
function hitEllipse(ox,oy,erx,ery){const r=tiny>0?R_HIT()*.55:R_HIT();const dx=(bal.x-ox)/(erx+r),dy=(bal.y-oy)/(ery+r);return dx*dx+dy*dy<1;}

function update(){
  fr++;scrollX+=spd;score+=spd*.05;
  spd=Math.min(6,2.2+score*.007);
  gasDecay=0.00065+score*.0000008;
  timeTimer++;if(timeTimer>3600){timeTimer=0;timeIdx=(timeIdx+1)%TIMES.length;}
  const ni=LOCS.findIndex((l,i)=>score>=l.d&&(i===LOCS.length-1||score<LOCS[i+1].d));
  if(ni!==locIdx){locIdx=ni;initBgBuildings();lbEl.textContent='📍 '+LOCS[locIdx].n;lbEl.style.opacity='1';lbTimer=200;}
  if(lbTimer>0){lbTimer--;if(lbTimer===0)lbEl.style.opacity='0';}
  if(dieCD>0)dieCD--;
  if(fr>240)hnEl.style.display='none';

  gas-=gasDecay;if(gas<0)gas=0;
  const lf=boost>0?LIFT_B:LIFT,gr=boost>0?GRAV_B:GRAV;
  if(lift&&gas>0)bal.vy+=lf;
  bal.vy+=gr;
  bal.vy=Math.max(-VMAX,Math.min(VMAX,bal.vy));
  bal.vy*=DAMP;
  bal.y+=bal.vy;

  const gy=GY(),cy2=CY();
  if(bal.y<cy2){bal.y=cy2;if(bal.vy<0)bal.vy=0;}
  if(bal.y>gy){bal.y=gy;if(bal.vy>0)bal.vy=0;if(st==='play'&&dieCD===0)die();}

  if(inv>0)inv--;if(boost>0)boost--;if(magnet>0)magnet--;if(tiny>0)tiny--;
  if(turbo>0){turbo--;score+=0.8;}
  bal.x=BX();
  clouds.forEach(c=>{c.x-=c.spd;if(c.x<-80)c.x=W+80;});

  const gasInt=gas<0.3?90:gas<0.6?130:185;
  if(fr-lastGas>gasInt){spawnGas();lastGas=fr;}
  if(fr-lastT>Math.max(60,170-score*.2)){spawnTree();lastT=fr;}
  if(fr-lastP>Math.max(200,420-score*.4)){spawnPickup();lastP=fr;}
  if(fr-lastBird>rnd(180,300)){spawnBird();lastBird=fr;}
  if(fr-lastStorm>Math.max(300,500-score*.3)){spawnStormCloud();lastStorm=fr;}

  if(magnet>0){pkups.forEach(p=>{const dx=bal.x-p.x,dy=bal.y-p.y,d=Math.hypot(dx,dy);if(d<220&&d>1){p.x+=dx/d*4;p.y+=dy/d*4;}});}

  trees=trees.filter(o=>{o.x-=spd;if(o.x<bal.x+60&&o.x+o.w>bal.x-60){if(hitRect(o.x,o.y,o.w,o.h)&&st==='play'){die();return false;}}return o.x>-80;});
  stormClouds=stormClouds.filter(s=>{s.x-=spd*.8;if(hitEllipse(s.x,s.y,s.rx,s.ry)&&st==='play'){die();return false;}return s.x>-s.rx-20;});
  pkups=pkups.filter(p=>{
    p.x-=spd;
    if(hitCircle(p.x,p.y,p.r)){
      if(p.type==='gas')       {gas=Math.min(1,gas+.55);addParts(p.x,p.y,['#FFB300','#FF7043','#5DCAA5']);}
      else if(p.type==='invincible'){inv=INV_MAX;addParts(p.x,p.y,['#64B5F6','#E3F2FD']);}
      else if(p.type==='life') {lives=Math.min(3,lives+1);updLives();addParts(p.x,p.y,['#EF9A9A','#E53935']);}
      else if(p.type==='speed'){boost=240;boostMax=240;addParts(p.x,p.y,['#CE93D8','#9C27B0']);}
      else if(p.type==='magnet'){magnet=300;addParts(p.x,p.y,['#FF80C0','#FF2080']);}
      else if(p.type==='tiny') {tiny=360;addParts(p.x,p.y,['#80FFCC','#00AA66']);}
      else if(p.type==='turbo'){turbo=180;score+=200;addParts(p.x,p.y,['#FFA030','#FF4000']);}
      return false;
    }
    return p.x>-40;
  });
  const nearB=birds.find(b=>b.vx>0&&b.x>0&&b.x<bal.x+140&&Math.abs(b.y-bal.y)<80);
  if(nearB)birdWarnT=35;if(birdWarnT>0)birdWarnT--;
  bwEl.style.opacity=birdWarnT>0?'1':'0';
  birds=birds.filter(b=>{b.x+=b.vx;b.y+=b.vy;b.vy+=.018;b.vy*=.95;if(hitCircle(b.x,b.y,10)&&st==='play'){die();return false;}return b.x>-100&&b.x<W+100;});
  parts=parts.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.07;p.life-=.04;return p.life>0;});

  gfEl.style.width=(Math.max(0,gas)*100)+'%';
  gfEl.style.background=gas>.5?'#5DCAA5':gas>.25?'#EF9F27':'#E24B4A';
  bf2El.style.width=(boost/Math.max(1,boostMax)*100)+'%';
  scEl.textContent=Math.floor(score)+' м';
  hbEl.textContent='📍 '+LOCS[locIdx].n+' \u00a0⏱ '+TIMES[timeIdx].n;
  if(gas<=0&&bal.vy<VMAX)bal.vy=Math.min(bal.vy+.3,VMAX);
}

function drawStart(){
  dSky();clouds.forEach(dCloud);dBgBuildings();dGround();
  const bw=Math.min(420,W-32),bh=240;
  ctx.fillStyle='rgba(0,0,0,.6)';ctx.beginPath();ctx.roundRect(W/2-bw/2,H/2-bh/2,bw,bh,18);ctx.fill();
  ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font=`bold ${Math.min(22,W*.038)}px sans-serif`;ctx.fillText('🎈 Кунгурские аэронавты',W/2,H/2-82);
  ctx.font=`${Math.min(13,W*.022)}px sans-serif`;ctx.fillStyle='rgba(255,255,255,.85)';
  ctx.fillText('Облетай деревья, тучи и птиц',W/2,H/2-48);
  ctx.fillText('⛽ газ  🛡 щит  ❤️ жизнь  ⚡ подъём',W/2,H/2-22);
  ctx.fillText('🧲 магнит  🫧 малыш  🚀 турбо',W/2,H/2+4);
  ctx.fillText('Кунгур → Пермь → Москва',W/2,H/2+30);
  ctx.fillStyle='#FFB300';ctx.font=`bold ${Math.min(17,W*.028)}px sans-serif`;
  ctx.fillText('▶  Нажми / коснись экрана',W/2,H/2+76);
}
function drawDead(){
  ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font=`bold ${Math.min(28,W*.044)}px sans-serif`;ctx.fillText('Полёт завершён 💨',W/2,H/2-58);
  ctx.font=`${Math.min(19,W*.03)}px sans-serif`;ctx.fillStyle='#FFD54F';
  ctx.fillText('Пройдено: '+Math.floor(score)+' м',W/2,H/2-10);
  ctx.fillStyle='rgba(255,255,255,.82)';ctx.font=`${Math.min(14,W*.022)}px sans-serif`;
  ctx.fillText('Достигнуто: '+LOCS.filter(l=>score>=l.d).pop().n,W/2,H/2+22);
  ctx.fillStyle='#FFB300';ctx.font=`bold ${Math.min(16,W*.026)}px sans-serif`;
  ctx.fillText('▶  Нажми / коснись снова',W/2,H/2+74);
}

function draw(){
  ctx.clearRect(0,0,W,H);
  if(st==='start'){drawStart();return;}
  dSky();dStars();dSun();
  clouds.forEach(dCloud);
  dBgBuildings();
  stormClouds.forEach(dStormCloud);
  trees.forEach(dTree);
  pkups.forEach(dPickup);
  birds.forEach(dBird);
  dGround();dParts();
  const flame=lift&&gas>0,blink=inv>0&&Math.floor(fr/6)%2===0;
  if(!blink)dBalloon(bal.x,bal.y,flame);
  if(inv>0)dBalloon(bal.x,bal.y,flame);
  if(st==='dead')drawDead();
}

function reset(){
  resize();
  bal={x:BX(),y:H/2,vy:0};
  trees=[];stormClouds=[];pkups=[];birds=[];parts=[];
  score=0;gas=1;lives=3;spd=2.2;scrollX=0;fr=0;
  lastT=0;lastP=0;lastBird=0;lastGas=0;lastStorm=0;
  inv=0;boost=0;boostMax=0;dieCD=0;magnet=0;tiny=0;turbo=0;
  timeIdx=0;timeTimer=0;locIdx=0;
  hnEl.style.display='block';lbEl.style.opacity='0';bwEl.style.opacity='0';
  initClouds();initStars();initBgBuildings();updLives();
  st='play';
}
function handle(dn){if((st==='start'||st==='dead')&&dn){reset();return;}if(st==='play')lift=dn;}
cv.addEventListener('mousedown',()=>handle(true));
cv.addEventListener('mouseup',()=>handle(false));
cv.addEventListener('mouseleave',()=>{if(st==='play')lift=false;});
cv.addEventListener('touchstart',e=>{e.preventDefault();handle(true);},{passive:false});
cv.addEventListener('touchend',e=>{e.preventDefault();handle(false);},{passive:false});
cv.addEventListener('touchcancel',e=>{e.preventDefault();handle(false);},{passive:false});
window.addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();handle(true);}});
window.addEventListener('keyup',e=>{if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();handle(false);}});

initSprites();
initClouds();initStars();initBgBuildings();updLives();
(function loop(){if(st==='play')update();draw();requestAnimationFrame(loop);})();
})();
</script>
</body>
